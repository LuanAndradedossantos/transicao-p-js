<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculo-tinta</title>
    <script src="calcu-pin.js"></script>
    <link rel="stylesheet" href="calcu-pin.css">
</head>

<header>
    <h1>Calculadora para pinturas</h1>

    <h2>Veja a quantidade aproximada de tinta em m&sup2;  para pinturas em paredes </h2>
</header>

<body>

    <fieldset>
    
        <legend>
            <h3>Selecione a marca da tinta</h3>
        </legend>
    <!--para alternar as marcações das bolinhas do input tipo radio é necessario que o atributo name seja o mesmo em todas as opçoes de input as quias queremos que seja referentes a mesma questão-->
        <input type="radio" name="marca1" id="marca1" value="marca1">
        <label for="marca1">Suvinil</label><br>
    
        <input type="radio" name="marca1" id="marca2" value="marca2">
        <label for="marca1">Coral</label>
    </fieldset>


    <h2>Insira as dimensões que serão pintadas</h2>
    <input type="number" name="larg" id="larg" placeholder="Largura">
    <input type="number" name="alt" id="alt" placeholder="Altura">
    <button onclick="opera()">Calcular</button>
    <p id="result"></p>

</body>
   

</html>
